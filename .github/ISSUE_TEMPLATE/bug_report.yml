name: Bug report
description: Report something that's broken
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the sections below so we can reproduce the issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When PR #42 merged, ai-auto-merge resolved conflicts in PR #45 but the resulting code did not compile.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open PR with conflict in `src/foo.ts`
        2. Merge another PR that touches the same file
        3. Observe the auto-resolved commit
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: ai-auto-merge version or commit SHA
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: '22.5.0'
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Self-hosted (Node)
        - Self-hosted (Docker)
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant log output. Redact secrets first.
      render: text

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have redacted secrets from any pasted output
          required: true
