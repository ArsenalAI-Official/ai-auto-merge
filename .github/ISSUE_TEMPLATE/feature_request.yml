name: Feature request
description: Suggest a new capability or improvement
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user pain or use case. Avoid jumping straight to a solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about, and why did you reject it?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, related issues.

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues for similar requests
          required: true
